services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: moto
      POSTGRES_PASSWORD: moto
      POSTGRES_DB: motocompare
    ports:
      # Host port 5433: 5432 is a common collision with other local Postgres instances.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moto -d motocompare"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
